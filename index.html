<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Espera</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:20px;
    background:#f4f4f4;
}

h1{
    text-align:center;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    box-sizing:border-box;
    margin-bottom:10px;
}

button{
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.agregar{
    width:100%;
    background:#2563eb;
    color:white;
}

.persona{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
    padding:10px;
    background:white;
    border-radius:8px;
}

.atendido{
    background:#16a34a;
    color:white;
}
</style>
</head>

<body>

<h1>📋 Lista de Espera</h1>

<div class="card">
    <input id="nombre" placeholder="Nombre de la persona">
    <button class="agregar" onclick="agregarPersona()">
        Agregar Persona
    </button>
</div>

<div id="lista"></div>

<script type="module">

// 🔥 Firebase imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    deleteDoc,
    doc,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 CONFIG FIREBASE (la tuya)
const firebaseConfig = {
  apiKey: "AIzaSyBnhuampwb_...",
  authDomain: "lista-de-espera-6b89d.firebaseapp.com",
  projectId: "lista-de-espera-6b89d",
  storageBucket: "lista-de-espera-6b89d.firebasestorage.app",
  messagingSenderId: "19656055004",
  appId: "1:19656055004:web:a3a4ab6eb7d45de3e7fc19"
};

// 🔥 inicializar
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const col = collection(db, "lista");

// 🧪 PRUEBA CLAVE (esto DEBE aparecer en consola)
console.log("🔥 Firebase script ejecutándose");

// ➕ agregar persona
window.agregarPersona = async function () {

    const nombre = document.getElementById("nombre").value.trim();

    if (!nombre) {
        alert("Escribe un nombre");
        return;
    }

    console.log("📤 Intentando guardar en Firebase...");

    try {
        await addDoc(col, {
            nombre,
            hora: new Date().toLocaleTimeString(),
            timestamp: Date.now()
        });

        console.log("✅ Guardado en Firebase");

        document.getElementById("nombre").value = "";

    } catch (error) {
        console.error("❌ Error al guardar:", error);
    }
};

// ❌ eliminar (atendido)
window.atender = async function (id) {
    console.log("🗑 Eliminando:", id);
    await deleteDoc(doc(db, "lista", id));
};

// 🔄 lectura en tiempo real
onSnapshot(col, (snapshot) => {

    console.log("📡 Datos recibidos:", snapshot.size);

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    let turno = 1;

    snapshot.forEach((d) => {
        const p = d.data();

        lista.innerHTML += `
            <div class="persona">
                <div>
                    <strong>${turno++}</strong> - ${p.nombre}
                    <br>
                    <small>${p.hora}</small>
                </div>

                <button class="atendido" onclick="atender('${d.id}')">
                    Atendido
                </button>
            </div>
        `;
    });
});
</script>

</body>
</html>

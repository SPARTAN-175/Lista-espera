<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Espera</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:20px;
    background:#f4f4f4;
}

h1{
    text-align:center;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    box-sizing:border-box;
    margin-bottom:10px;
}

button{
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.agregar{
    width:100%;
    background:#2563eb;
    color:white;
}

.persona{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
    padding:10px;
    background:white;
    border-radius:8px;
}

.atendido{
    background:#16a34a;
    color:white;
}
</style>
</head>
<body>

<h1>📋 Lista de Espera</h1>

<div class="card">
    <input id="nombre" placeholder="Nombre de la persona">
    <button class="agregar" onclick="agregarPersona()">
        Agregar Persona
    </button>
</div>

<div id="lista"></div>

<script>

let personas = [];
let turnoActual = 1;

function agregarPersona(){

    const nombre = document.getElementById('nombre').value.trim();

    if(!nombre){
        alert('Escribe un nombre');
        return;
    }

    personas.push({
        turno: turnoActual++,
        nombre:nombre,
        hora:new Date().toLocaleTimeString()
    });

    document.getElementById('nombre').value='';

    renderizar();
}

function atender(turno){

    personas = personas.filter(p => p.turno !== turno);

    renderizar();
}

function renderizar(){

    const lista = document.getElementById('lista');

    lista.innerHTML='';

    personas.forEach(p=>{

        lista.innerHTML += `
        <div class="persona">
            <div>
                <strong>${p.turno}</strong> -
                ${p.nombre}
                <br>
                <small>${p.hora}</small>
            </div>

            <button class="atendido"
                onclick="atender(${p.turno})">
                Atendido
            </button>
        </div>
        `;
    });
}

</script>

</body>
</html>

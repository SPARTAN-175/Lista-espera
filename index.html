<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<title>Sistema de Lista de Espera</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:20px;
    background:#f4f4f4;
}

h1{
    text-align:center;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.stats{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    margin-bottom:10px;
    box-sizing:border-box;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.agregar{
    width:100%;
    background:#2563eb;
    color:white;
}

.nuevo-dia{
    width:100%;
    background:#ef4444;
    color:white;
    margin-top:10px;
}

.persona{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
    padding:10px;
    background:white;
    border-radius:8px;
}

.estado-pendiente{
    color:#d97706;
    font-weight:bold;
}

.estado-atendido{
    color:#16a34a;
    font-weight:bold;
}

.atendido{
    background:#16a34a;
    color:white;
}

/*==================================
TICKET DE TURNO
==================================*/

.ticket-modal{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.45);

    display:none;

    justify-content:center;

    align-items:center;

    padding:20px;

    z-index:9999;

}

.ticket-modal.show{

    display:flex;

    animation:fadeIn .25s ease;

}

.ticket{

    width:100%;

    max-width:360px;

    background:#FFFFFF;

    border-radius:28px;

    padding:30px 24px;

    text-align:center;

    box-shadow:0 20px 45px rgba(0,0,0,.18);

}

.ticket-success{

    width:70px;

    height:70px;

    margin:0 auto 18px;

    border-radius:50%;

    background:#E8F5E9;

    color:#2E7D32;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:34px;

}

.ticket h2{

    font-size:26px;

    margin-bottom:6px;

    color:#1F2937;

}

.ticket>p{

    color:#6B7280;

    margin-bottom:20px;

}

.ticket-divider{

    height:1px;

    background:#E5E7EB;

    margin:20px 0;

}

.ticket small{

    display:block;

    color:#2E7D32;

    font-weight:700;

    letter-spacing:2px;

    margin-bottom:10px;

}

.ticket-turno{

    font-size:72px;

    font-weight:800;

    color:#2E7D32;

    line-height:1;

    margin-bottom:14px;

}

.ticket-nombre{

    font-size:22px;

    font-weight:700;

    color:#1F2937;

}

.ticket-hora{

    margin-top:10px;

    color:#6B7280;

    font-size:16px;

}

.ticket-texto{

    margin-top:18px;

    font-size:15px;

    line-height:1.6;

    color:#4B5563;

}

#cerrarTicket{

    width:100%;

    height:54px;

    margin-top:24px;

    border:none;

    border-radius:16px;

    background:#2E7D32;

    color:white;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

}

@keyframes fadeIn{

    from{

        opacity:0;

        transform:scale(.95);

    }

    to{

        opacity:1;

        transform:scale(1);

    }

            }


    #ticketQR{

    display:flex;

    justify-content:center;

    margin:18px 0;

}

.ticket-qr-texto{

    font-size:14px;

    color:#6B7280;

    line-height:1.5;

}

.acciones{
    display:flex;
    gap:8px;
    align-items:center;
}

.incompleto{
    background:#F59E0B;
    color:#fff;
    border:none;
    padding:8px 12px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

.estado-incompleto{
    color:#D97706;
    font-weight:700;
    font-size:14px;
}

.fecha-hoy{

    text-align:center;

    color:#6B7280;

    font-size:14px;

    font-weight:500;

    margin-bottom:14px;

    line-height:1.6;

}

#horaActualSistema{

    font-size:18px;

    font-weight:700;

    color:#1F7A43;

}
</style>
</head>

<body>

<div class="fecha-hoy">

    <div id="fechaHoy"></div>

    <div id="horaActualSistema"></div>

</div>

<h1>📋 Sistema de Espera</h1>

<div class="card">

<div class="stats">
  <div>⏳ Pendientes: <span id="pendientes">0</span></div>
  <div>✅ Atendidos: <span id="atendidos">0</span></div>
</div>

<input id="nombre" placeholder="Nombre de la persona">

<button class="agregar" onclick="agregarPersona()">
  Agregar Persona
</button>

<button class="nuevo-dia" onclick="nuevoDia()">
  🔄 Nuevo Día
</button>

</div>

<div id="lista"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  updateDoc,
  doc,
  onSnapshot,
  query,
  getDocs,
  deleteDoc,
    orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBnhuampwb_...",
  authDomain: "lista-de-espera-6b89d.firebaseapp.com",
  projectId: "lista-de-espera-6b89d",
  storageBucket: "lista-de-espera-6b89d.firebasestorage.app",
  messagingSenderId: "19656055004",
  appId: "1:19656055004:web:a3a4ab6eb7d45de3e7fc19"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const listaRef = collection(db, "lista");
const q = query(listaRef, orderBy("turno", "asc"));



/*==================================
FECHA Y HORA
==================================*/

function actualizarFechaHora(){

    const ahora = new Date();

    const fecha = ahora.toLocaleDateString("es-MX",{

        weekday:"long",

        year:"numeric",

        month:"long",

        day:"numeric"

    });

    const hora = ahora.toLocaleTimeString("es-MX",{

        hour:"2-digit",

        minute:"2-digit",

        second:"2-digit"

    });

    document.getElementById("fechaHoy").textContent = fecha;

    document.getElementById("horaActualSistema").textContent = hora;

}

actualizarFechaHora();

setInterval(actualizarFechaHora,1000);

    

// 🔢 AGREGAR PERSONA (turno automático correcto)
window.agregarPersona = async function () {

  const nombre = document.getElementById("nombre").value.trim();
  if (!nombre) return alert("Escribe un nombre");

  const snapshot = await getDocs(listaRef);

  let maxTurno = 0;

  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    if (data.turno > maxTurno) {
      maxTurno = data.turno;
    }
  });

  const nuevoTurno = maxTurno + 1;

  const hora = new Date().toLocaleTimeString();

await addDoc(listaRef, {
  turno: nuevoTurno,
  nombre,
  hora,
  estado: "pendiente",
  timestamp: Date.now()
});

  document.getElementById("nombre").value = "";

mostrarTicket(
    nuevoTurno,
    nombre,
    hora
);
};

// 🟢 MARCAR COMO ATENDIDO
window.atender = async function (id) {
  await updateDoc(doc(db, "lista", id), {
    estado: "atendido"
  });
};

// 🟠 MARCAR COMO INCOMPLETO
window.incompleto = async function (id) {

  await updateDoc(doc(db, "lista", id), {
    estado: "incompleto"
  });

};

// 🔄 TIEMPO REAL
onSnapshot(q, (snapshot) => {

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  let pendientes = 0;
  let atendidos = 0;

  snapshot.forEach(d => {

    const p = d.data();

    if (p.estado === "pendiente") pendientes++;
    else atendidos++;

    lista.innerHTML += `
      <div class="persona">
        <div>
          <strong>T${String(p.turno).padStart(3,'0')}</strong> - ${p.nombre}
          <br>
          <small>${p.hora}</small>
          <div class="${p.estado === 'pendiente' ? 'estado-pendiente' : 'estado-atendido'}">
            ${p.estado.toUpperCase()}
          </div>
        </div>

        ${p.estado === "pendiente"
  ? `
    <div class="acciones">

      <button
        class="incompleto"
        onclick="incompleto('${d.id}')">

        Incompleto

      </button>

      <button
        class="atendido"
        onclick="atender('${d.id}')">

        Atender

      </button>

    </div>
  `
  : p.estado === "incompleto"
  ? `
    <div class="acciones">

      <span class="estado-incompleto">

        ⚠ Incompleto

      </span>

      <button
        class="atendido"
        onclick="atender('${d.id}')">

        Atender

      </button>

    </div>
  `
  : `<button disabled>Atendido</button>`
    }
      </div>
    `;
  });

  document.getElementById("pendientes").textContent = pendientes;
  document.getElementById("atendidos").textContent = atendidos;
});

// 🔄 NUEVO DÍA (simple)
    window.nuevoDia = async function () {

  const confirmar = confirm("⚠️ ¿Seguro que quieres iniciar un nuevo día? Se borrará toda la lista.");

  if (!confirmar) return;

  const snapshot = await getDocs(listaRef);

  snapshot.forEach(async (d) => {
    await deleteDoc(doc(db, "lista", d.id));
  });

  alert("✅ Nuevo día iniciado. Lista reiniciada.");
};

//const enlaceConsulta =
//"https://spartan-175.github.io/Lista-espera/consulta.html";

/*==================================
MOSTRAR TICKET
==================================*/

function mostrarTicket(turno, nombre, hora){

    document.getElementById("ticketTurno").textContent =
        "T" + String(turno).padStart(3,"0");

    document.getElementById("ticketNombre").textContent =
        nombre;

    document.getElementById("ticketHora").textContent =
        "🕒 " + hora;

   /* const qr = document.getElementById("ticketQR");

qr.innerHTML = "";

new QRCode(qr,{

    text: enlaceConsulta,

    width:120,

    height:120

});*/

    document
        .getElementById("ticketModal")
        .classList
        .add("show");

}

/*==================================
CERRAR TICKET
==================================*/

document
.getElementById("cerrarTicket")
.addEventListener("click",()=>{

    document
    .getElementById("ticketModal")
    .classList
    .remove("show");

});

    
</script>


<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

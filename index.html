<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  updateDoc,
  doc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBnhuampwb_...",
  authDomain: "lista-de-espera-6b89d.firebaseapp.com",
  projectId: "lista-de-espera-6b89d",
  storageBucket: "lista-de-espera-6b89d.firebasestorage.app",
  messagingSenderId: "19656055004",
  appId: "1:19656055004:web:a3a4ab6eb7d45de3e7fc19"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const col = collection(db, "lista");

// 🔢 turno local simple
let contador = 1;

// ➕ agregar persona
window.agregarPersona = async function () {

  const nombre = document.getElementById("nombre").value.trim();

  if (!nombre) return alert("Escribe un nombre");

  await addDoc(col, {
    turno: contador++,
    nombre,
    hora: new Date().toLocaleTimeString(),
    estado: "pendiente",
    timestamp: Date.now()
  });

  document.getElementById("nombre").value = "";
};

// 🟢 marcar como atendido (YA NO BORRA)
window.atender = async function (id) {
  await updateDoc(doc(db, "lista", id), {
    estado: "atendido"
  });
};

// 🔄 render en tiempo real
onSnapshot(col, (snapshot) => {

  const lista = document.getElementById("lista");

  lista.innerHTML = "";

  let pendientes = 0;
  let atendidos = 0;

  snapshot.forEach((d) => {

    const p = d.data();

    if (p.estado === "pendiente") {
      pendientes++;
    } else {
      atendidos++;
    }

    lista.innerHTML += `
      <div class="persona">
        <div>
          <strong>T${String(p.turno).padStart(3,'0')}</strong> - ${p.nombre}
          <br>
          <small>${p.hora}</small>
          <div class="${p.estado === 'pendiente' ? 'estado-pendiente' : 'estado-atendido'}">
            ${p.estado.toUpperCase()}
          </div>
        </div>

        ${p.estado === "pendiente"
          ? `<button class="atendido" onclick="atender('${d.id}')">Atender</button>`
          : `<button disabled>Atendido</button>`
        }
      </div>
    `;
  });

  document.getElementById("pendientes").textContent = pendientes;
  document.getElementById("atendidos").textContent = atendidos;
});

// 🧹 NUEVO DÍA / REINICIAR
window.nuevoDia = function () {
  contador = 1;
  location.reload(); // simple pero efectivo
};

</script>

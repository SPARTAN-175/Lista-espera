<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Lista de Espera</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:20px;
    background:#f4f4f4;
}

h1{
    text-align:center;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.stats{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    margin-bottom:10px;
    box-sizing:border-box;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.agregar{
    width:100%;
    background:#2563eb;
    color:white;
}

.nuevo-dia{
    width:100%;
    background:#ef4444;
    color:white;
    margin-top:10px;
}

.persona{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
    padding:10px;
    background:white;
    border-radius:8px;
}

.estado-pendiente{
    color:#d97706;
    font-weight:bold;
}

.estado-atendido{
    color:#16a34a;
    font-weight:bold;
}

.atendido{
    background:#16a34a;
    color:white;
}
</style>
</head>

<body>

<h1>📋 Sistema de Espera</h1>

<div class="card">

<div class="stats">
  <div>⏳ Pendientes: <span id="pendientes">0</span></div>
  <div>✅ Atendidos: <span id="atendidos">0</span></div>
</div>

<input id="nombre" placeholder="Nombre de la persona">

<button class="agregar" onclick="agregarPersona()">
  Agregar Persona
</button>

<button class="nuevo-dia" onclick="nuevoDia()">
  🔄 Nuevo Día
</button>

</div>

<div id="lista"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBnhuampwb_...",
  authDomain: "lista-de-espera-6b89d.firebaseapp.com",
  projectId: "lista-de-espera-6b89d",
  storageBucket: "lista-de-espera-6b89d.firebasestorage.app",
  messagingSenderId: "19656055004",
  appId: "1:19656055004:web:a3a4ab6eb7d45de3e7fc19"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const listaRef = collection(db, "lista");
const q = listaRef;

// 🔢 AGREGAR PERSONA (turno automático correcto)
window.agregarPersona = async function () {

  const nombre = document.getElementById("nombre").value.trim();
  if (!nombre) return alert("Escribe un nombre");

  const snapshot = await getDocs(listaRef);

  let maxTurno = 0;

  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    if (data.turno > maxTurno) {
      maxTurno = data.turno;
    }
  });

  const nuevoTurno = maxTurno + 1;

  await addDoc(listaRef, {
    turno: nuevoTurno,
    nombre,
    hora: new Date().toLocaleTimeString(),
    estado: "pendiente",
    timestamp: Date.now()
  });

  document.getElementById("nombre").value = "";
};

// 🟢 MARCAR COMO ATENDIDO
window.atender = async function (id) {
  await updateDoc(doc(db, "lista", id), {
    estado: "atendido"
  });
};

// 🔄 TIEMPO REAL
onSnapshot(q, (snapshot) => {

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  let pendientes = 0;
  let atendidos = 0;

  snapshot.forEach(d => {

    const p = d.data();

    if (p.estado === "pendiente") pendientes++;
    else atendidos++;

    lista.innerHTML += `
      <div class="persona">
        <div>
          <strong>T${String(p.turno).padStart(3,'0')}</strong> - ${p.nombre}
          <br>
          <small>${p.hora}</small>
          <div class="${p.estado === 'pendiente' ? 'estado-pendiente' : 'estado-atendido'}">
            ${p.estado.toUpperCase()}
          </div>
        </div>

        ${p.estado === "pendiente"
          ? `<button class="atendido" onclick="atender('${d.id}')">Atender</button>`
          : `<button disabled>Atendido</button>`
        }
      </div>
    `;
  });

  document.getElementById("pendientes").textContent = pendientes;
  document.getElementById("atendidos").textContent = atendidos;
});

// 🔄 NUEVO DÍA (simple)
    window.nuevoDia = async function () {

  const confirmar = confirm("⚠️ ¿Seguro que quieres iniciar un nuevo día? Se borrará toda la lista.");

  if (!confirmar) return;

  const snapshot = await getDocs(listaRef);

  snapshot.forEach(async (d) => {
    await deleteDoc(doc(db, "lista", d.id));
  });

  alert("✅ Nuevo día iniciado. Lista reiniciada.");
};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Consulta de Turnos</title>

    <!-- CSS -->

<link rel="stylesheet" href="css/reset.css">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/layout.css">

<link rel="stylesheet" href="css/header.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/list.css">
<link rel="stylesheet" href="css/modal.css">

<link rel="stylesheet" href="css/consulta.css">
    

    <!-- Tipografía -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>
<main class="app">

    <!--=========================
        ENCABEZADO
    ==========================-->

    <header class="top-header">

        <div class="brand">

            <div class="brand-icon">

                🪪

            </div>

            <div class="brand-text">

                <span>Credencialización</span>

                <small>de Salud Universal</small>

            </div>

        </div>

        <button
            class="info-button"
            id="infoButton">

            <span>ⓘ</span>

            <small>Información</small>

        </button>

    </header>


    <!--=========================
        BUSCADOR
    ==========================-->

    <section class="search-section">

        <h1>

            Buscar mi turno

        </h1>

        <div class="search-box">

            <input
                type="text"
                id="buscar"
                placeholder="Buscar por nombre de la persona...">

        </div>
        <div id="resultadoBusqueda" class="resultado-busqueda"></div>

    </section>


    <!--=========================
        TURNO ACTUAL
    ==========================-->

    <section class="current-turn">

        <p class="section-title">

            TURNO ACTUAL

        </p>

        <h2
    class="turn-number"
    id="turnoActual">

    T000

</h2>

<p
    class="person-name"
    id="nombreActual">

    Sin personas

</p>

<div
    class="turn-time"
    id="horaActual">

    🕒 --:--

</div>

    </section>


    <!--=========================
        SIGUIENTES
    ==========================-->

    <section class="next-section">

        <h3>

            SIGUIENTES TURNOS

        </h3>
<div class="next-turns">

    <div class="next-card">

        <strong id="nextTurn1">---</strong>

    </div>

    <div class="next-card">

        <strong id="nextTurn2">---</strong>

    </div>

    <div class="next-card">

        <strong id="nextTurn3">---</strong>

    </div>

</div>

    </section>


    <!--=========================
        LISTA
    ==========================-->

    <section class="waiting-list">

        <h3>

            LISTA DE ESPERA

        </h3>

        <div class="table-list" id="listaEspera">

        </div>

    </section>

</main>
    

<!-- =========================
     POPUP INFORMACIÓN
========================== -->

<div
    class="modal"
    id="infoModal">

    <div class="modal-content">

        <h2>

            Credencialización de Salud Universal

        </h2>

        <p>

            Aquí aparecerá la información del trámite.

        </p>

        <button id="closeModal">

            Cerrar

        </button>

    </div>

</div>


<script type="module" src="js/consulta.js"></script>

</body>
                               </html>
